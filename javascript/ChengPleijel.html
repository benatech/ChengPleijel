<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cheng-Pleijel Canvas</title>
  <style>
    :root { font-family: system-ui, -apple-system, Segoe UI, sans-serif; }
    body { margin: 0; background: #f6f6f6; }
    header { padding: 12px 16px; background: #222; color: white; }
    main { display: flex; gap: 16px; padding: 16px; align-items: flex-start; }
    canvas { background: white; border: 1px solid #aaa; touch-action: none;}
    aside { max-width: 360px; font-size: 14px; line-height: 1.4; }
    textarea { width: 100%; height: 220px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
    button { margin-top: 8px; padding: 8px 12px; }
    .hint { color: #555; }
    .metric { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; white-space: pre-wrap; }
  </style>
</head>
<body>
  <header><strong>Cheng-Pleijel Canvas</strong> </header>
  <main>
    <canvas id="slate" width="550" height="400"></canvas>
    <aside hidden>
      <p class="hint">Drag red/orange points. Press <kbd>R</kbd> to reset.</p>
      <p>This canvas implements the Cheng-Pleijel point of a quadrangle.</p>
      <div id="metrics" class="metric"></div>
      <h3>Applet-style elements</h3>
      <textarea id="elementData"></textarea>
      <button id="reload">Reload data</button>
      <p class="hint">Format: <code>name;class;construction;data;nameColor;vertexColor;edgeColor;faceColor</code>.</p>
    </aside>
  </main>
  <script type="module" src="./cheng-pleijel.js"></script>
</body>
</html>
